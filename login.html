<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dealer | Login</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="auth-container" style="max-width: 400px; margin: 100px auto; padding: 30px; background: #FFFFFF; border-radius: 12px; border: 1px solid #E8DFC8; box-shadow: 0 8px 28px rgba(23,23,28,.06);">
        <h2 style="text-align: center; margin-bottom: 20px; color:#17171C;">Megacars <span class="accent" style="color:#C9A24A;">Dealer Cabinet</span></h2>
        <form id="loginForm">
            <div class="form-group"><label>მომხმარებელი</label><input type="text" id="username" required></div>
            <div class="form-group">
                <label>პაროლი</label>
                <div class="password-container" style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" required style="width: 100%; padding-right: 60px;">
                    <button type="button" id="togglePass" style="position: absolute; right: 10px; background: none; border: none; color: #B38A3A; cursor: pointer; font-weight: bold; font-size: 10px;">Show</button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 15px;">შესვლა</button>
        </form>
    </div>

    <script>
        // Password toggle
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePass');
        const show = () => passInput.type = 'text';
        const hide = () => passInput.type = 'password';
        toggleBtn.onmousedown = show; toggleBtn.onmouseup = hide; toggleBtn.onmouseleave = hide;

        // Login Submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    // STRICT SECURITY: Uses sessionStorage so it forgets you when the tab closes
                    sessionStorage.setItem('mai_user', JSON.stringify(data));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "Login failed");
                }
            } catch (err) {
                alert("CRITICAL ERROR: Your server is turned off! Run 'node server.js' in the terminal.");
            }
        });
    </script>
</body>
</html>
