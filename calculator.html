        const stateMap = {};
        Object.keys(shippingRates).forEach(loc => {
            const parts = loc.split(' - ');
            const state = parts.length > 1 ? parts.pop().trim() : "OTHER";
            const city = parts.join(' - ').trim() || loc;
            if(!stateMap[state]) stateMap[state] = [];
            stateMap[state].push({ fullKey: loc, cityName: city });
        });

        const originState = document.getElementById('originState');
        const originCity = document.getElementById('originCity');
        const destSelect = document.getElementById('destPort');
        const bidInput = document.getElementById('bidAmount');

        const soloAuctionType = document.getElementById('soloAuctionType');
        const soloLotPrice = document.getElementById('soloLotPrice');

        Object.keys(stateMap).sort().forEach(state => {
            let option = document.createElement('option');
            option.value = state; option.textContent = state;
            originState.appendChild(option);
        });

        originState.addEventListener('change', function() {
            originCity.innerHTML = '<option value="" disabled selected>-- Choose City --</option>';
            if(stateMap[this.value]) {
                stateMap[this.value].sort((a,b)=>a.cityName.localeCompare(b.cityName)).forEach(item => {
                    let option = document.createElement('option');
                    option.value = item.fullKey; option.textContent = item.cityName;
                    originCity.appendChild(option);
                });
                originCity.disabled = false;
            } else { originCity.disabled = true; }
            runCalculations();
        });

        // Math engine
        function calculateAuctionFee(bid, type) {
            if (bid <= 0) return 0;
            if (type === 'manheim') return Math.round((bid * 0.05) + 150); // Approx Manheim Scale
            
            let buyerFee = 0;
            if (bid < 500) buyerFee = 125; else if (bid < 1000) buyerFee = 225;
            else if (bid < 2000) buyerFee = 350; else if (bid < 3000) buyerFee = 450;
            else if (bid < 4000) buyerFee = 550; else if (bid < 5000) buyerFee = 650;
            else if (bid < 7500) buyerFee = 750; else if (bid < 10000) buyerFee = 850;
            else buyerFee = bid * 0.075; 
            return Math.round(buyerFee + 79 + 129 + 10);
        }

        function runCalculations() {
            // Full Calculator Updates
            const bid = parseFloat(bidInput.value) || 0;
            const copartFees = calculateAuctionFee(bid, 'copart'); // Default to copart for shipping total
            document.getElementById('dispCopart').innerText = `$${copartFees.toLocaleString()}`;

            let shippingCost = 0;
            const selectedLoc = originCity.value; const port = destSelect.value;
            if (selectedLoc && port && shippingRates[selectedLoc] && shippingRates[selectedLoc][port]) {
                shippingCost = shippingRates[selectedLoc][port];
                document.getElementById('dispShipping').innerText = `$${shippingCost.toLocaleString()}`;
            } else {
                document.getElementById('dispShipping').innerText = selectedLoc && port ? "არ არის ხელმისაწვდომი" : "$0";
            }

            if (bid > 0 && shippingCost > 0) {
                document.getElementById('dispTotal').innerText = `$${(bid + copartFees + shippingCost).toLocaleString()}`;
            } else { document.getElementById('dispTotal').innerText = "$0"; }

            // Solo Auction Calculator Updates
            const sBid = parseFloat(soloLotPrice.value) || 0;
            const sType = soloAuctionType.value;
            const sFee = calculateAuctionFee(sBid, sType);
            document.getElementById('soloAuctionFee').innerText = `$${sFee.toLocaleString()}`;
            document.getElementById('soloTotalCost').innerText = `$${(sBid > 0 ? sBid + sFee : 0).toLocaleString()}`;
        }

        [bidInput, originCity, destSelect, soloLotPrice, soloAuctionType].forEach(el => el.addEventListener('input', runCalculations));
