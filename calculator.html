<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megacars - Cost Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-bg-container">
        <img src="Megacarsbackgroundpc.jpg" class="bg-photo desktop-photo" alt="Background">
        <img src="Megacarsbackgroundmobile.jpg" class="bg-photo mobile-photo" alt="Background">
        <div class="overlay"></div>
    </div>

    <header class="header-container">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;"><h2>Megacars</h2></a>
        </div>
        <nav class="top-nav-links">
            <a href="index.html">მთავარი</a>
            <a href="calculator.html" style="color: #ffcc00;">კალკულატორი</a>
        </nav>
        <div class="header-right">
            <a href="https://wa.me/1234567890" target="_blank" class="whatsapp-icon" title="Contact on WhatsApp">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#25D366" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.005-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
            </a>
            <a href="login.html" class="btn-portal" style="margin-left: 20px;">დილერების შესვლა</a>
        </div>
    </header>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 40px 5%; margin-top: 50px;">
        <section class="content-section" style="flex: 1; min-width: 350px; max-width: 500px; padding: 0;">
            <h2 class="section-title" style="font-size: 1.8rem;">აუქციონის კალკულატორი</h2>
            <div class="calc-slide-container" style="background: rgba(17, 17, 17, 0.95);">
                <div class="calc-form-group">
                    <label>აირჩიეთ აუქციონი</label>
                    <select id="soloAuctionType">
                        <option value="copart">Copart / IAAI</option>
                        <option value="manheim">Manheim</option>
                    </select>
                </div>
                <div class="calc-form-group">
                    <label>ლოტის ფასი ($)</label>
                    <input type="number" id="soloLotPrice" placeholder="მაგ. 2500">
                </div>
                <div style="margin-top: 25px; padding: 15px; background: #0a0a0a; border-left: 4px solid #ffcc00; border-radius: 4px;">
                    <p style="color: #ccc; font-size: 16px;">აუქციონის მოსაკრებელი: <strong id="soloAuctionFee" style="color: #fff;">$0</strong></p>
                    <hr style="border-color: #333; margin: 10px 0;">
                    <p style="color: #ffcc00; font-size: 20px; font-weight: bold;">სრული ჯამი (მანქანა + აუქციონი): <span id="soloTotalCost">$0</span></p>
                </div>
            </div>
        </section>

        <section class="content-section" style="flex: 2; min-width: 350px; padding: 0;">
            <h2 class="section-title" style="font-size: 1.8rem;">მიწოდების ღირებულება</h2>
            <div class="calc-slide-container" style="max-width: 100%; background: rgba(17, 17, 17, 0.95);">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>აუქციონი</label>
                        <select id="fullAuctionSource">
                            <option value="copart">Copart</option>
                            <option value="iaai">IAAI</option>
                        </select>
                    </div>
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>მანქანის ტიპი</label>
                        <select id="vehicleType">
                            <option value="sedan">სედანი</option>
                            <option value="jeep">ჯიპი</option>
                            <option value="mediumJeep">საშუალო ჯიპი</option>
                            <option value="largeJeep">დიდი ჯიპი</option>
                            <option value="motorcycle">მოტოციკლეტი</option>
                            <option value="quad">კვადროციკლი</option>
                            <option value="nonstandard">არასტანდარტული</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>ლოტის ფასი ($)</label>
                        <input type="number" id="bidAmount" placeholder="მაგ. 2500">
                    </div>
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>აირჩიეთ პორტი (Destination Port)</label>
                        <select id="destPort">
                            <option value="" disabled selected>-- Choose Port --</option>
                            <option value="GA">Georgia (GA)</option>
                            <option value="NY">New York (NY)</option>
                            <option value="CA">California (CA)</option>
                            <option value="TX">Texas (TX)</option>
                            <option value="WA">Washington (WA)</option>
                            <option value="VA">Virginia (VA)</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>აირჩიეთ შტატი (Origin State)</label>
                        <select id="originState"><option value="" disabled selected>-- Choose State --</option></select>
                    </div>
                    <div class="calc-form-group" style="flex: 1; min-width: 200px;">
                        <label>აირჩიეთ ქალაქი (Origin City)</label>
                        <select id="originCity" disabled><option value="" disabled selected>-- Choose City --</option></select>
                    </div>
                </div>

                <div style="background: #0a0a0a; padding: 20px; border-radius: 4px; border-left: 4px solid #ffcc00; margin-top: 20px;">
                    <p style="color: #ccc; display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px;">აუქციონის ფიქსირებული მოსაკრებელი: <strong id="dispCopart" style="color: #fff;">$0</strong></p>
                    <p id="dispTowing" style="display:none;">$0</p>
                    <p id="dispContainer" style="display:none;">$0</p>
                    <p id="dispServiceFee" style="display:none;">$200</p>
                    <p style="color: #ccc; display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px;">ტრანსპორტირების ჯამი: <strong id="dispShipping" style="color: #fff;">$0</strong></p>
                    <hr style="border-color: #333; margin: 15px 0;">
                    <p style="color: #ffcc00; display: flex; justify-content: space-between; font-size: 22px; font-weight: bold;">სრული ჯამი (მანქანა + ტრანსპორტი): <span id="dispTotal">$0</span></p>
                </div>
            </div>
        </section>
    </div>

    <script src="copart-rates.js"></script>
    <script src="iaai-rates.js"></script>
    <script src="container-rates.js"></script>
    <script>
        const PORTS = ['GA', 'NY', 'CA', 'TX', 'WA', 'VA'];
        const SERVICE_FEE = 200;

        // Vehicle type -> which container row to use + how many vehicles share that container.
        // sedan/jeep come directly from the dealer's instructions (sedan=4/container, jeep=3/container).
        // mediumJeep/largeJeep/quad/nonstandard are reasonable extrapolations — flag to adjust if needed.
        const VEHICLE_CONTAINER_MAP = {
            sedan:       { row: CONTAINER_RATES['40ft4auto'], divisor: 4 },
            jeep:        { row: CONTAINER_RATES['40ft3auto'], divisor: 3 },
            mediumJeep:  { row: CONTAINER_RATES['40ft3auto'], divisor: 3 },
            largeJeep:   { row: CONTAINER_RATES['45ft4auto'], divisor: 4 },
            motorcycle:  { row: CONTAINER_RATES['motorcycle'], divisor: 1 },
            quad:        { row: CONTAINER_RATES['motorcycle'], divisor: 1 },
            nonstandard: { row: CONTAINER_RATES['oversizeMotorcycle'], divisor: 1 }
        };

        const originState = document.getElementById('originState');
        const originCity = document.getElementById('originCity');
        const destSelect = document.getElementById('destPort');
        const bidInput = document.getElementById('bidAmount');
        const auctionSourceSelect = document.getElementById('fullAuctionSource');
        const vehicleTypeSelect = document.getElementById('vehicleType');

        const soloAuctionType = document.getElementById('soloAuctionType');
        const soloLotPrice = document.getElementById('soloLotPrice');

        function getActiveRates() {
            return auctionSourceSelect.value === 'iaai' ? IAAI_RATES : COPART_RATES;
        }

        function buildStateMap(rates) {
            const map = {};
            Object.keys(rates).forEach(loc => {
                const parts = loc.split(' - ');
                const state = parts.length > 1 ? parts[parts.length - 1].trim() : 'OTHER';
                const city = parts.length > 1 ? parts.slice(0, -1).join(' - ').trim() : loc;
                if (!map[state]) map[state] = [];
                map[state].push({ fullKey: loc, cityName: city });
            });
            return map;
        }

        let currentStateMap = {};

        function populateStates() {
            currentStateMap = buildStateMap(getActiveRates());
            originState.innerHTML = '<option value="" disabled selected>-- Choose State --</option>';
            Object.keys(currentStateMap).sort().forEach(state => {
                const option = document.createElement('option');
                option.value = state; option.textContent = state;
                originState.appendChild(option);
            });
            originCity.innerHTML = '<option value="" disabled selected>-- Choose City --</option>';
            originCity.disabled = true;
        }

        originState.addEventListener('change', function () {
            originCity.innerHTML = '<option value="" disabled selected>-- Choose City --</option>';
            if (currentStateMap[this.value]) {
                currentStateMap[this.value].sort((a, b) => a.cityName.localeCompare(b.cityName)).forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.fullKey; option.textContent = item.cityName;
                    originCity.appendChild(option);
                });
                originCity.disabled = false;
            } else {
                originCity.disabled = true;
            }
            runCalculations();
        });

        auctionSourceSelect.addEventListener('change', () => { populateStates(); runCalculations(); });

        // Math engine
        function calculateAuctionFee(bid, type) {
            if (bid <= 0) return 0;
            if (type === 'manheim') return Math.round((bid * 0.05) + 150); // Approx Manheim Scale

            let buyerFee = 0;
            if (bid < 500) buyerFee = 125; else if (bid < 1000) buyerFee = 225;
            else if (bid < 2000) buyerFee = 350; else if (bid < 3000) buyerFee = 450;
            else if (bid < 4000) buyerFee = 550; else if (bid < 5000) buyerFee = 650;
            else if (bid < 7500) buyerFee = 750; else if (bid < 10000) buyerFee = 850;
            else buyerFee = bid * 0.075;
            return Math.round(buyerFee + 79 + 129 + 10);
        }

        function runCalculations() {
            // Full Calculator Updates
            const bid = parseFloat(bidInput.value) || 0;
            const copartFees = calculateAuctionFee(bid, 'copart'); // Default to copart for shipping total
            document.getElementById('dispCopart').innerText = `$${copartFees.toLocaleString()}`;

            const rates = getActiveRates();
            const selectedLoc = originCity.value;
            const port = destSelect.value;
            const portIdx = PORTS.indexOf(port);

            let towingCost = null;
            if (selectedLoc && portIdx > -1 && rates[selectedLoc]) {
                towingCost = rates[selectedLoc][portIdx];
            }

            // NOTE: the towing rate tables already include the container share and
            // the dealer's margin baked in (this is the dealer's own finalized quote,
            // not a raw carrier rate sheet) — do NOT add container cost or a service
            // fee on top of it. The vehicle-type selector is kept in the UI for future
            // use but currently has no effect on the total.
            const dispTowing = document.getElementById('dispTowing');
            const dispContainer = document.getElementById('dispContainer');
            const dispShipping = document.getElementById('dispShipping');

            dispTowing.innerText = (towingCost === null || towingCost === undefined)
                ? (selectedLoc && port ? 'არ არის ხელმისაწვდომი' : '$0')
                : `$${towingCost.toLocaleString()}`;
            dispContainer.innerText = '$0';

            let shippingTotal = 0;
            let shippingValid = false;
            if (towingCost !== null && towingCost !== undefined) {
                shippingTotal = towingCost;
                shippingValid = true;
                dispShipping.innerText = `$${shippingTotal.toLocaleString()}`;
            } else {
                dispShipping.innerText = '$0';
            }

            if (bid > 0 && shippingValid) {
                document.getElementById('dispTotal').innerText = `$${(bid + copartFees + shippingTotal).toLocaleString()}`;
            } else {
                document.getElementById('dispTotal').innerText = '$0';
            }

            // Solo Auction Calculator Updates
            const sBid = parseFloat(soloLotPrice.value) || 0;
            const sType = soloAuctionType.value;
            const sFee = calculateAuctionFee(sBid, sType);
            document.getElementById('soloAuctionFee').innerText = `$${sFee.toLocaleString()}`;
            document.getElementById('soloTotalCost').innerText = `$${(sBid > 0 ? sBid + sFee : 0).toLocaleString()}`;
        }

        populateStates();
        [bidInput, originCity, destSelect, soloLotPrice, soloAuctionType, vehicleTypeSelect].forEach(el => el.addEventListener('input', runCalculations));
        destSelect.addEventListener('change', runCalculations);
        vehicleTypeSelect.addEventListener('change', runCalculations);
        if (soloAuctionType) soloAuctionType.addEventListener('change', runCalculations);
        runCalculations();
    </script>
</body>
</html>
